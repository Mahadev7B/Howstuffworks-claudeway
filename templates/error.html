<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oops — HowStuffWorks</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="error-page">
    <h1>Uh oh — something went wrong</h1>
    {% if question %}<p class="question">You asked: <em>"{{ question }}"</em></p>{% endif %}
    <pre class="error-detail">{{ error }}</pre>
    <a href="{{ url_for('home') }}" class="btn">← Try another question</a>
  </main>
</body>
</html>
