<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HowStuffWorks — for curious kids</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="home">
    <header class="brand">
      <h1>How<span>Stuff</span>Works</h1>
      <p class="tagline">Ask anything. See how it works. Hear it explained.</p>
    </header>

    <form action="{{ url_for('lesson') }}" method="post" class="ask-form" id="askForm">
      <input
        type="text"
        name="question"
        id="question"
        placeholder="How do rockets fly?"
        required
        autofocus
        autocomplete="off"
      />
      <button type="button" id="micBtn" class="mic-btn" aria-label="Search by voice" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="12" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9" y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <button type="submit">Ask</button>
    </form>

    <section class="examples">
      <p class="examples-label">Try one:</p>
      <ul>
        {% for q in examples %}
          <li><button type="button" class="chip" data-idx="{{ loop.index0 }}">{{ q }}</button></li>
        {% endfor %}
      </ul>
    </section>

    <footer>
      <p>Powered by AI · Illustrated lessons · Voice by OpenAI</p>
    </footer>
  </main>

  <div class="loading" id="loading" hidden>
    <div class="loading-inner">
      <p id="loadingMsg">Drawing your lesson…</p>
      <p class="muted">While you wait — collect the stars. Avoid the asteroid! <span id="elapsed">0s</span></p>
      <canvas id="game" width="360" height="240" tabindex="0" aria-label="Space mini game"></canvas>
      <p class="muted game-hint" id="gameHint">Arrow keys or W A S D · <span id="gameStatus">Stars: 0</span></p>
      <div class="dpad" id="dpad">
        <button class="dpad-btn" data-dx="0"  data-dy="-1" aria-label="Up">▲</button>
        <div class="dpad-middle">
          <button class="dpad-btn" data-dx="-1" data-dy="0"  aria-label="Left">◀</button>
          <div class="dpad-spacer"></div>
          <button class="dpad-btn" data-dx="1"  data-dy="0"  aria-label="Right">▶</button>
        </div>
        <button class="dpad-btn" data-dx="0"  data-dy="1"  aria-label="Down">▼</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('askForm');
    const input = document.getElementById('question');
    const loading = document.getElementById('loading');
    const loadingMsg = document.getElementById('loadingMsg');
    const elapsed = document.getElementById('elapsed');

    const QUESTIONS = {{ examples | tojson }};

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        const q = QUESTIONS[parseInt(chip.dataset.idx, 10)];
        if (q) {
          input.value = q;
          form.requestSubmit();
        }
      });
    });

    // ---------- Voice search ---------------------------------------
    const micBtn = document.getElementById('micBtn');
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;

    if (SpeechRecognition) {
      micBtn.hidden = false;
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        micBtn.classList.add('mic-listening');
        micBtn.setAttribute('aria-label', 'Listening…');
        input.placeholder = 'Listening…';
      };

      recognition.onresult = (e) => {
        const transcript = Array.from(e.results)
          .map(r => r[0].transcript).join('');
        input.value = transcript;
        if (e.results[e.results.length - 1].isFinal) {
          micBtn.classList.remove('mic-listening');
          micBtn.setAttribute('aria-label', 'Search by voice');
          input.placeholder = 'How do rockets fly?';
          if (transcript.trim()) form.requestSubmit();
        }
      };

      recognition.onerror = (e) => {
        micBtn.classList.remove('mic-listening');
        micBtn.setAttribute('aria-label', 'Search by voice');
        input.placeholder = 'How do rockets fly?';
        if (e.error !== 'no-speech' && e.error !== 'aborted') {
          input.placeholder = 'Mic error: ' + e.error;
          setTimeout(() => { input.placeholder = 'How do rockets fly?'; }, 2500);
        }
      };

      recognition.onend = () => {
        micBtn.classList.remove('mic-listening');
        micBtn.setAttribute('aria-label', 'Search by voice');
        if (!input.value) input.placeholder = 'How do rockets fly?';
      };

      micBtn.addEventListener('click', () => {
        if (micBtn.classList.contains('mic-listening')) {
          recognition.stop();
        } else {
          input.value = '';
          recognition.start();
        }
      });
    }

    form.addEventListener('submit', () => {
      loading.hidden = false;
      const start = Date.now();
      setInterval(() => {
        const s = Math.floor((Date.now() - start) / 1000);
        elapsed.textContent = s + 's';
        if (s === 15) loadingMsg.textContent = 'Sketching the scene…';
        else if (s === 30) loadingMsg.textContent = 'Adding colour and labels…';
        else if (s === 50) loadingMsg.textContent = 'Almost done — final touches…';
        else if (s === 75) loadingMsg.textContent = 'Still going — this one is taking a while.';
      }, 250);
      startGame();
    });

    // ---------- Space mini-game ---------------------------------------
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const gameStatus = document.getElementById('gameStatus');
    const COLS = 12, ROWS = 8, CELL = 30;
    let player, asteroid, stars, score, dir, gameLoopId, thrustFrame, frame;

    function resetGame() {
      player   = { x: 1, y: 1 };
      asteroid = { x: COLS - 2, y: ROWS - 2, dir: { x: -1, y: 0 } };
      stars = [];
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          if (!(x === player.x && y === player.y) && !(x === asteroid.x && y === asteroid.y)) {
            stars.push({ x, y });
          }
        }
      }
      score = 0;
      dir = { x: 0, y: 0 };
      thrustFrame = 0;
      frame = 0;
      updateStatus();
    }

    function updateStatus(extra) {
      gameStatus.textContent = (extra ? extra + ' · ' : '') + 'Stars: ' + score;
    }

    function moveAsteroid() {
      const dx = player.x - asteroid.x;
      const dy = player.y - asteroid.y;
      let nx = asteroid.dir.x, ny = asteroid.dir.y;
      if (Math.random() < 0.6) {
        if (Math.abs(dx) > Math.abs(dy)) { nx = Math.sign(dx); ny = 0; }
        else { nx = 0; ny = Math.sign(dy) || (Math.random() < 0.5 ? 1 : -1); }
      } else {
        const choices = [[1,0],[-1,0],[0,1],[0,-1]];
        const c = choices[Math.floor(Math.random() * choices.length)];
        nx = c[0]; ny = c[1];
      }
      const tx = asteroid.x + nx;
      const ty = asteroid.y + ny;
      if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS) {
        asteroid.x = tx; asteroid.y = ty;
        asteroid.dir = { x: nx, y: ny };
      }
    }

    function tick() {
      if (!stars) return;  // guard against tick firing before resetGame
      frame++;
      if (frame % 6 === 0) {
        const tx = player.x + dir.x;
        const ty = player.y + dir.y;
        if (tx >= 0 && tx < COLS && ty >= 0 && ty < ROWS) {
          player.x = tx; player.y = ty;
        }
        const idx = stars.findIndex(s => s.x === player.x && s.y === player.y);
        if (idx >= 0) { stars.splice(idx, 1); score++; updateStatus(); }
        thrustFrame = (dir.x !== 0 || dir.y !== 0) ? (thrustFrame + 1) % 4 : 0;
      }
      if (frame % 9 === 0) moveAsteroid();

      if (player.x === asteroid.x && player.y === asteroid.y) {
        updateStatus('Hit! Restarting…');
        clearInterval(gameLoopId);
        gameLoopId = null;
        setTimeout(() => { resetGame(); loop(); }, 1200);
        return;
      }
      if (stars.length === 0) {
        updateStatus('All stars collected!');
        clearInterval(gameLoopId);
        gameLoopId = null;
        setTimeout(() => { resetGame(); loop(); }, 1500);
        return;
      }
      draw();
    }

    function drawStar(cx, cy, r, points) {
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const a = (i * Math.PI) / points - Math.PI / 2;
        const rad = i % 2 === 0 ? r : r * 0.45;
        if (i === 0) ctx.moveTo(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad);
        else ctx.lineTo(cx + Math.cos(a) * rad, cy + Math.sin(a) * rad);
      }
      ctx.closePath();
      ctx.fill();
    }

    function drawRocket(cx, cy, dx, dy) {
      ctx.save();
      ctx.translate(cx, cy);
      // Rotate to face movement direction
      const angle = (dx !== 0 || dy !== 0) ? Math.atan2(dy, dx) + Math.PI / 2 : -Math.PI / 2;
      ctx.rotate(angle);
      // Body
      ctx.fillStyle = '#C8C0FF';
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(6, 4);
      ctx.lineTo(-6, 4);
      ctx.closePath();
      ctx.fill();
      // Nose cone
      ctx.fillStyle = '#FFFFFF';
      ctx.beginPath();
      ctx.moveTo(0, -10);
      ctx.lineTo(3, -3);
      ctx.lineTo(-3, -3);
      ctx.closePath();
      ctx.fill();
      // Fins
      ctx.fillStyle = '#534AB7';
      ctx.beginPath(); ctx.moveTo(6, 4); ctx.lineTo(10, 8); ctx.lineTo(4, 6); ctx.closePath(); ctx.fill();
      ctx.beginPath(); ctx.moveTo(-6, 4); ctx.lineTo(-10, 8); ctx.lineTo(-4, 6); ctx.closePath(); ctx.fill();
      // Thruster flame
      if (thrustFrame > 0) {
        ctx.fillStyle = thrustFrame % 2 === 0 ? '#EF9F27' : '#FF6B35';
        ctx.beginPath();
        ctx.moveTo(-3, 5);
        ctx.lineTo(3, 5);
        ctx.lineTo(0, 5 + 4 + thrustFrame * 2);
        ctx.closePath();
        ctx.fill();
      }
      ctx.restore();
    }

    function drawAsteroid(cx, cy) {
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(frame * 0.04);
      ctx.fillStyle = '#8B7355';
      ctx.beginPath();
      const pts = [
        [0,-11],[5,-8],[10,-5],[11,1],[8,7],[3,10],
        [-3,11],[-8,7],[-11,2],[-9,-4],[-5,-9]
      ];
      ctx.moveTo(pts[0][0], pts[0][1]);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i][0], pts[i][1]);
      ctx.closePath();
      ctx.fill();
      // Crater marks
      ctx.fillStyle = '#6B5A42';
      ctx.beginPath(); ctx.arc(-3, -2, 2.5, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(4, 4, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.restore();
    }

    function draw() {
      // Space background
      ctx.fillStyle = '#0A0820';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Faint background star specks
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      for (let i = 0; i < 30; i++) {
        const bx = ((i * 73 + 17) % canvas.width);
        const by = ((i * 41 + 29) % canvas.height);
        ctx.fillRect(bx, by, 1, 1);
      }

      // Collectible stars
      ctx.fillStyle = '#FAD750';
      for (const s of stars) {
        drawStar(s.x * CELL + CELL / 2, s.y * CELL + CELL / 2, 5, 5);
      }

      // Rocket (player)
      drawRocket(player.x * CELL + CELL / 2, player.y * CELL + CELL / 2, dir.x, dir.y);

      // Asteroid
      drawAsteroid(asteroid.x * CELL + CELL / 2, asteroid.y * CELL + CELL / 2);
    }

    function loop() {
      if (gameLoopId) clearInterval(gameLoopId);
      gameLoopId = setInterval(tick, 50); // ~20fps — smooth enough, easy on CPU
    }

    function startGame() {
      if (gameLoopId) clearInterval(gameLoopId);
      gameLoopId = null;
      resetGame();
      draw();        // paint first frame immediately so canvas isn't blank
      canvas.focus();
      loop();
    }

    document.addEventListener('keydown', (e) => {
      if (loading.hidden) return;
      switch (e.key) {
        case 'ArrowUp': case 'w': case 'W': dir = { x: 0, y: -1 }; e.preventDefault(); break;
        case 'ArrowDown': case 's': case 'S': dir = { x: 0, y: 1 }; e.preventDefault(); break;
        case 'ArrowLeft': case 'a': case 'A': dir = { x: -1, y: 0 }; e.preventDefault(); break;
        case 'ArrowRight': case 'd': case 'D': dir = { x: 1, y: 0 }; e.preventDefault(); break;
      }
    });

    // Show d-pad on any touch-capable device and update hint text
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
      document.getElementById('dpad').style.display = 'flex';
      document.getElementById('gameHint').firstChild.textContent = 'Tap d-pad or swipe · ';
    }

    // D-pad buttons — respond to both touch and mouse
    document.querySelectorAll('.dpad-btn').forEach(btn => {
      const press = (e) => {
        e.preventDefault();
        dir = { x: parseInt(btn.dataset.dx, 10), y: parseInt(btn.dataset.dy, 10) };
        btn.classList.add('pressed');
      };
      const release = () => btn.classList.remove('pressed');
      btn.addEventListener('touchstart', press, { passive: false });
      btn.addEventListener('touchend', release, { passive: true });
      btn.addEventListener('mousedown', press);
      btn.addEventListener('mouseup', release);
    });

    // Swipe on canvas — use canvas CSS scale to map touch coords correctly
    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault();
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
    }, { passive: false });
    canvas.addEventListener('touchend', (e) => {
      if (loading.hidden) return;
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
      if (Math.abs(dx) > Math.abs(dy)) dir = { x: Math.sign(dx), y: 0 };
      else dir = { x: 0, y: Math.sign(dy) };
    }, { passive: true });
  </script>
</body>
</html>
