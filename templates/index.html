<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HowStuffWorks — for curious kids</title>
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="home">
    <header class="brand">
      <h1>How<span>Stuff</span>Works</h1>
      <p class="tagline">Ask anything. See how it works. Hear it explained.</p>
    </header>

    <form action="{{ url_for('lesson') }}" method="post" class="ask-form" id="askForm">
      <input
        type="text"
        name="question"
        id="question"
        placeholder="How do rockets fly?"
        required
        autofocus
        autocomplete="off"
      />
      <button type="submit">Ask</button>
    </form>

    <section class="examples">
      <p class="examples-label">Try one:</p>
      <ul>
        {% for q in examples %}
          <li><button type="button" class="chip" data-q="{{ q }}">{{ q }}</button></li>
        {% endfor %}
      </ul>
    </section>

    <footer>
      <p>Powered by AI · Illustrations made of SVG · Voice by your browser</p>
    </footer>
  </main>

  <div class="loading" id="loading" hidden>
    <div class="loading-inner">
      <div class="spinner"></div>
      <p id="loadingMsg">Drawing your lesson…</p>
      <p class="muted">Illustrations take up to a minute. <span id="elapsed">0s</span></p>
    </div>
  </div>

  <script>
    const form = document.getElementById('askForm');
    const input = document.getElementById('question');
    const loading = document.getElementById('loading');
    const loadingMsg = document.getElementById('loadingMsg');
    const elapsed = document.getElementById('elapsed');

    document.querySelectorAll('.chip').forEach(chip => {
      chip.addEventListener('click', () => {
        input.value = chip.dataset.q;
        form.requestSubmit();
      });
    });

    form.addEventListener('submit', () => {
      loading.hidden = false;
      const start = Date.now();
      setInterval(() => {
        const s = Math.floor((Date.now() - start) / 1000);
        elapsed.textContent = s + 's';
        if (s === 15) loadingMsg.textContent = 'Sketching the scene…';
        else if (s === 30) loadingMsg.textContent = 'Adding colour and labels…';
        else if (s === 50) loadingMsg.textContent = 'Almost done — final touches…';
        else if (s === 75) loadingMsg.textContent = 'Still going — this one is taking a while.';
      }, 250);
    });
  </script>
</body>
</html>
