databases:
  - name: claudeway-db
    plan: free
    databaseName: claudeway
    user: claudeway

services:
  - type: web
    name: howstuffworks-claudeway
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.5
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_TTS_MODEL
        value: tts-1
      - key: OPENAI_TTS_VOICE
        value: nova
      - key: DAILY_BUDGET_USD
        value: "5.00"
      - key: MAX_COST_PER_LESSON_USD
        value: "0.15"
      - key: PER_IP_HOURLY_LIMIT
        value: "20"
      - key: IMAGE_PROVIDER
        value: matplotlib
      - key: FAL_API_KEY
        sync: false
      - key: FLUX_MODEL
        value: fal-ai/flux/schnell
      - key: FLUX_IMAGE_SIZE
        value: landscape_16_9
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: claudeway-db
          property: connectionString
